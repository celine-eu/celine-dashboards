version: "3"

tasks:
  setup:
    cmds:
      - mkdir -p config/superset
      - |
        ENV_FILE="config/superset/.env"
        touch "$ENV_FILE"

        if grep -q '^SUPERSET_SECRET_KEY=' "$ENV_FILE"; then
          echo "SUPERSET_SECRET_KEY already present in $ENV_FILE, skipping"
        else
          echo "SUPERSET_SECRET_KEY=$(openssl rand -base64 42)" >> "$ENV_FILE"
          echo "SUPERSET_SECRET_KEY written to $ENV_FILE"
        fi
      - cd packages/celine-superset && uv sync
      - cd packages/celine-superset-cli && uv sync
      - cd packages/jupyter_jwt_auth && uv sync

  start:
    desc: "Start containers"
    cmds:
      - docker compose up -d

  stop:
    desc: "Stop containers"
    cmds:
      - docker compose down

  restart:
    desc: "Stop containers"
    cmds:
      - task: stop
      - task: start

  reset:
    desc: "Stop and remove volumes"
    prompt: This will delete all the data and configuration. Continue ?
    cmds:
      - docker compose down -v

  logs:
    desc: "Show logs (pass service name with CLI_ARGS)"
    cmds:
      - docker compose logs -f {{.CLI_ARGS}}

  ps:
    desc: "List containers"
    cmds:
      - docker compose ps

  release:
    cmds:
      - uv run semantic-release -v version --no-vcs-release
      - git push
      - git push --tags

  test:
    desc: "Run tests for all packages"
    cmds:
      - cd packages/celine-superset && uv run pytest
      - cd packages/celine-superset-cli && uv run pytest

  test:auth:
    desc: "Run celine-superset auth tests only (no superset dep needed)"
    cmds:
      - cd packages/celine-superset && uv run pytest tests/auth/ -v

  test:cli:
    desc: "Run CLI tests"
    cmds:
      - cd packages/celine-superset-cli && uv run pytest -v
