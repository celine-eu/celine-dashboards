version: "3"

tasks:
  setup:
    cmds:
      - mkdir -p config/superset
      - |
        ENV_FILE="config/superset/.env"
        touch "$ENV_FILE"

        if grep -q '^SUPERSET_SECRET_KEY=' "$ENV_FILE"; then
          echo "SUPERSET_SECRET_KEY already present in $ENV_FILE, skipping"
        else
          echo "SUPERSET_SECRET_KEY=$(openssl rand -base64 42)" >> "$ENV_FILE"
          echo "SUPERSET_SECRET_KEY written to $ENV_FILE"
        fi
      - uv sync --all-extras

  start:
    desc: "Start containers"
    cmds:
      - docker compose up -d

  stop:
    desc: "Stop containers"
    cmds:
      - docker compose down

  restart:
    desc: "Stop containers"
    cmds:
      - task: stop
      - task: start

  reset:
    desc: "Stop and remove volumes"
    prompt: This will delete all the data and configuration. Continue ?
    cmds:
      - docker compose down -v

  logs:
    desc: "Show logs (pass service name with CLI_ARGS)"
    cmds:
      - docker compose logs -f {{.CLI_ARGS}}

  ps:
    desc: "List containers"
    cmds:
      - docker compose ps

  release:
    cmds:
      - uv run semantic-release -v version --no-vcs-release
      - git push
      - git push --tags

  test:
    desc: "Run all tests"
    cmds:
      - uv run pytest

  test:auth:
    desc: "Run Superset auth tests only (no Superset dep needed)"
    cmds:
      - uv run pytest tests/superset/auth/ -v

  test:cli:
    desc: "Run Superset CLI tests"
    cmds:
      - uv run pytest tests/superset/cli/ -v

  governance:sync:
    desc: "Sync Superset dataset governance"
    cmds:
      - |
        uv run celine-superset bootstrap
        uv run celine-superset governance sync \
          --path '../celine-pipelines/**/governance.yaml' \
          --path '../../../demo3/**/governance.yaml' \
          --owners '../dataset-api/owners.local.yaml' \
          --filter 'ds_dev_gold.*'
