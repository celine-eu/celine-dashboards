volumes:
  redis:
  superset_home:

networks:
  superset_net:

x-common: &common
  env_file:
    - path: ./config/superset/.env
      required: false
    - path: ./config/superset/.env-local
      required: false
  build:
    context: .
    dockerfile: Dockerfile
  networks:
    - superset_net
  extra_hosts:
    - "host-gw:host-gateway"
    - "host.docker.internal:host-gateway"
    - "keycloak.celine.localhost:host-gateway"
    - "sso.celine.localhost:host-gateway"
  user: "root"
  environment:
    PYTHONPATH: /opt/celine-dashboards/src:/app/pythonpath:/app/docker/pythonpath_dev
  volumes:
    - ./config/superset:/app/docker
    - ./src:/opt/celine-dashboards/src
    - ./README.md:/opt/celine-dashboards/README.md
    - ./pyproject.toml:/opt/celine-dashboards/pyproject.toml
    - superset_home:/app/superset_home

services:
  superset:
    <<: *common

    ## PROD
    # command: ["/app/docker/superset-bootstrap.sh", "app-gunicorn"]

    ## DEV
    command: ["/app/docker/superset-bootstrap.sh", "app"]

    # command: ["sleep", "infinity"]
    # tty: true
    # stdin_open: true

    restart: unless-stopped
    depends_on:
      superset-init:
        condition: service_completed_successfully
    ports:
      - 8088:8088

  superset-init:
    <<: *common
    command: ["/app/docker/superset-setup.sh"]
    depends_on:
      init-db:
        condition: service_completed_successfully
      redis:
        condition: service_started
    healthcheck:
      disable: true

  superset-worker:
    <<: *common
    command: ["/app/docker/superset-bootstrap.sh", "worker"]
    restart: unless-stopped
    depends_on:
      superset-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A superset.tasks.celery_app:app inspect ping -d celery@$$HOSTNAME",
        ]

  superset-worker-beat:
    <<: *common
    command: ["/app/docker/superset-bootstrap.sh", "beat"]
    restart: unless-stopped
    depends_on:
      superset-init:
        condition: service_completed_successfully
    healthcheck:
      disable: true

  init-db:
    image: postgres:17.4
    networks:
      - superset_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: ./config/superset/.env
        required: false
      - path: ./config/superset/.env-local
        required: false
    volumes:
      - ./config/postgres/init-db.sh:/init-db.sh:ro
    command: ["bash", "/init-db.sh"]
    restart: "no"

  redis:
    image: redis:7.2-bookworm
    networks:
      - superset_net
    restart: unless-stopped
    volumes:
      - redis:/data
    # Redis is limited to 7.2-bookworm due to licencing change
    # https://redis.io/blog/redis-adopts-dual-source-available-licensing/
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s

  jupyter:
    build:
      dockerfile: Dockerfile.jupyter
    volumes:
      - ./config/jupyter/jupyterhub_config.py:/home/jovyan/.jupyter/jupyterhub_config.py
      - ./packages/celine-jupyter/src:/opt/celine-jupyter/src
      - ./data/notebooks:/home/jovyan/notebooks
    restart: unless-stopped
    networks:
      - superset_net
    extra_hosts:
      - "host-gw:host-gateway"
      - "host.docker.internal:host-gateway"
      - "keycloak.celine.localhost:host-gateway"
    environment:
      PYTHONPATH: /opt/celine-jupyter/src
    ports:
      - 8888:8888
