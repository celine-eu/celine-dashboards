[project]
name = "celine-superset"
version = "0.1.0"
description = "CELINE Superset SSO plugin and management CLI"
readme = "README.md"
requires-python = ">=3.10,<3.13"
dependencies = [
    "pyjwt>=2.10.1",
]

[project.optional-dependencies]
plugin = [
    "cryptography>=44.0.0",
    "psycopg2-binary>=2.9.11",
    "requests>=2.32.5",
]
cli = [
    "attrs>=22.2.0",
    "httpx>=0.27.0",
    "python-dateutil>=2.8.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "pyyaml>=6.0",
    "rich>=13.0.0",
    "typer>=0.12.0",
]
all = [
    "celine-superset[plugin,cli]",
]

[project.scripts]
celine-superset = "celine.superset.cli.main:app"

[dependency-groups]
dev = [
    "apache-superset==6.0.0",
    "celery>=5.6.0",
    "flask-appbuilder>=5.0.2",
    "flask-caching>=2.3.1",
    "openapi-python-client>=0.28.3",
    "pytest>=9.0.2",
    "pytest-mock>=3.15.1",
    "respx>=0.21.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/celine"]

[tool.hatch.build.targets.sdist]
include = ["src/celine"]

[tool.pytest.ini_options]
testpaths = ["tests"]
