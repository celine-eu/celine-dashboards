[project]
name = "celine-superset-cli"
version = "0.1.0"
description = "CLI for Superset resource import/export — datasets, charts, dashboards"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "attrs>=22.2.0",
    "httpx>=0.27.0",
    "python-dateutil>=2.8.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "rich>=13.0.0",
    "typer>=0.12.0",
]

[project.scripts]
celine-superset = "celine.superset.cli.main:app"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-mock>=3.15.1",
    "respx>=0.21.0",
    "python-semantic-release>=9.21.0",
    "openapi-python-client>=0.28.3",
]

[tool.uv]
package = true

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true
include = ["celine.superset.cli*"]
exclude = ["tests"]

[tool.pytest.ini_options]
testpaths = ["tests"]
