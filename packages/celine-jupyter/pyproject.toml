[project]
name = "celine-jupyter"
version = "0.1.0"
description = "CELINE Jupyter JWT authorizer"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pyjwt>=2.10.1",
    "requests>=2.32.5",
    "celine-utils>=1.16.0",
]

[dependency-groups]
dev = [
    "jupyter-server>=2.17.0",
    "pytest>=9.0.3",
    "pytest-mock>=3.15.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/celine"]

[tool.hatch.build.targets.sdist]
include = ["src/celine"]

[tool.pytest.ini_options]
testpaths = ["tests"]
